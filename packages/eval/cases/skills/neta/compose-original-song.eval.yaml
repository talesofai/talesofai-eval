type: skill
id: skill-neta-discover-compose-original-song
description: Generate a song with specified musical style and lyrics
input:
  skill: neta
  model: deepseek/deepseek-chat
  evaluation_mode: discover
  task: I want to create an original song with custom lyrics in a synthwave style.
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - make_song
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "compose-original-song"
        workflow? Generate a song with specified musical style and lyrics
      pass_threshold: 0.7

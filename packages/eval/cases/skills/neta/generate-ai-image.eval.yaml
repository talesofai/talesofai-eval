type: skill
id: skill-neta-discover-generate-ai-image
description: Create custom AI-generated images using prompts, aspect ratios, and
  optional reference images
input:
  skill: neta
  model: doubao-2.0-mini
  evaluation_mode: discover
  task: create an image using [prompt details, aspect ratio, reference image info]
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - make_image
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "generate-ai-image" workflow?
        Create custom AI-generated images using prompts, aspect ratios, and
        optional reference images
      pass_threshold: 0.7

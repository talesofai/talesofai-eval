type: skill
id: skill-neta-discover-get-tag-information
description: Retrieve detailed metadata, usage data, and information about a
  specific hashtag/tag
input:
  skill: neta
  model: doubao-2.0-mini
  evaluation_mode: discover
  task: get information for the hashtag [tag-name]
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - get_hashtag_info
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "get-tag-information" workflow?
        Retrieve detailed metadata, usage data, and information about a specific
        hashtag/tag
      pass_threshold: 0.7

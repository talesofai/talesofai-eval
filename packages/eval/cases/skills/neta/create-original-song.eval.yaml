type: skill
id: skill-neta-discover-create-original-song
description: Generate a complete song with specified musical style and custom lyrics
input:
  skill: neta
  evaluation_mode: discover
  task: I want to create an epic fantasy battle song with lyrics about a hero's
    journey
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - make_song
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "create-original-song" workflow?
        Generate a complete song with specified musical style and custom lyrics
      pass_threshold: 0.7

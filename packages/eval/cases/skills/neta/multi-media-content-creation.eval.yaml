type: skill
id: skill-neta-discover-multi-media-content-creation
description: Create a complete multimedia piece combining images, video, and music
input:
  skill: neta
  evaluation_mode: discover
  task: I want to create a short animated story with background music about a
    fantasy adventure
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - make_image
        - make_video
        - make_song
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "multi-media-content-creation"
        workflow? Create a complete multimedia piece combining images, video,
        and music
      pass_threshold: 0.7

type: skill
id: skill-neta-discover-explore-world-spaces
description: Browse available world spaces, view details, and explore sub-topics
  to understand the setting for content creation
input:
  skill: neta
  evaluation_mode: discover
  task: I want to see what fantasy worlds or settings are available to create
    content in
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - list_spaces
        - get_hashtag_info
        - list_space_topics
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "explore-world-spaces" workflow?
        Browse available world spaces, view details, and explore sub-topics to
        understand the setting for content creation
      pass_threshold: 0.7

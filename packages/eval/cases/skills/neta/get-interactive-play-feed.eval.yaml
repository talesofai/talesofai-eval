type: skill
id: skill-neta-discover-get-interactive-play-feed
description: Fetch a paginated list of interactive gameplay and creation content
  feeds from the Neta API
input:
  skill: neta
  model: doubao-2.0-mini
  evaluation_mode: discover
  task: get page [page-index] of interactive content with [page-size] items per page
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - request_interactive_feed
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "get-interactive-play-feed"
        workflow? Fetch a paginated list of interactive gameplay and creation
        content feeds from the Neta API
      pass_threshold: 0.7

type: skill
id: skill-neta-discover-fan-content-creation
description: Create fan art or content based on existing characters and worlds
input:
  skill: neta
  evaluation_mode: discover
  task: I want to create fan art of my favorite character in a new pose and setting
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - search_character_or_elementum
        - make_image
        - make_video
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "fan-content-creation" workflow?
        Create fan art or content based on existing characters and worlds
      pass_threshold: 0.7

type: skill
id: skill-neta-discover-create-action-video
description: Generate a short video based on an image source and action description
input:
  skill: neta
  model: deepseek/deepseek-chat
  evaluation_mode: discover
  task: I have a character image and I want to make a short video of them
    performing a specific action.
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - make_video
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "create-action-video" workflow?
        Generate a short video based on an image source and action description
      pass_threshold: 0.7

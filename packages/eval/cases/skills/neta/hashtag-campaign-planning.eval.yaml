type: skill
id: skill-neta-discover-hashtag-campaign-planning
description: Research a hashtag's ecosystem to plan content creation that aligns with trends
input:
  skill: neta
  model: deepseek/deepseek-chat
  evaluation_mode: discover
  task: I'm planning to create content for the '#scifi' community and want to
    understand what's already popular.
  skills_dir: /home/ubuntu/projects/neta-skills/skills
criteria:
  assertions:
    - type: tool_usage
      tier: 1
      expected_tools:
        - get_hashtag_info
        - get_hashtag_characters
        - get_hashtag_collections
        - make_image
        - make_video
    - type: skill_usage
      tier: 2
      checks:
        - skill_loaded
        - workflow_followed
        - skill_influenced_output
      pass_threshold: 0.7
    - type: llm_judge
      tier: 2
      prompt: Did the agent successfully complete the "hashtag-campaign-planning"
        workflow? Research a hashtag's ecosystem to plan content creation that
        aligns with trends
      pass_threshold: 0.7

type: agent
id: online-bca91627-7df6-4c46-b462-312f6b0fadb5
description: online extract from collection bca91627-7df6-4c46-b462-312f6b0fadb5 (历史角色变身器)
input:
  preset_key: latitude://8|live|running_agent_new
  parameters:
    preset_description: 单张角色历史场景转换图
    reference_planning: |-
      /*
      <group>
      <request_character>
      <assign>character</assign>
      </request_character>
      <request_text>
      <assign>text</assign>
      </request_text>
      </group>

      <group>
      <assign>
      <variable_name>ref_image</variable_name>
      </assign>
      </group>

      <group>
      <edit_image>
      <assign>main_image</assign>
      <reference_image_a>{ref_image}</reference_image_a>
      </edit_image>
      </group>

      <group>
      <end></end>
      </group>
      */
    reference_content: |-
      text: 清朝
      main_image: 严格参考并保留图片中的角色外貌特征与画面风格，不得参考其他画面元素，如场景，文字等，生成1张该角色清朝皇帝，身穿明黄色龙袍，头戴帝冕，坐在金色龙椅上，手持玉玺，神情威严庄重的图片。不得直接采用原图动作及表情。要求图片比例3:4
    reference_content_schema: |-
      character: object 选中的角色信息
      text: string 历史年代
      ref_image: image 角色参考图
      main_image: image 最终生成图
  messages:
    - role: user
      content: 让{@character}变身大清皇帝，坐在龙椅上超有帝王范儿
  auto_followup:
    mode: adversarial_help_choose
    max_turns: 1
criteria:
  llm_judge:
    prompt: 评估该回合执行质量（0-1分）。核心原则：1）结果导向：最终输出是否满足用户意图？2）工具使用合理：是否正确使用工具完成任务？不强制要求特定工具名，关注功能合理性；3）无干扰行为：未调用与任务无关的工具。评分：1.0=完美完成，0.7-0.9=基本完成有轻微冗余，0.4-0.6=部分完成有缺陷，0.1-0.3=严重偏离，0=完全失败。注意：执行计划仅供参考，工具名称可能变化，允许合理的多轮交互。
      若任务信息充足，应继续执行并尽量产出结果，不应空谈；3) 若任务天然需要用户补充关键信息（如先选角色），assistant
      明确提出所需信息也可判通过；4) 偏题、拒答、无关闲聊、关键步骤缺失判不通过。
    pass_threshold: 0.7

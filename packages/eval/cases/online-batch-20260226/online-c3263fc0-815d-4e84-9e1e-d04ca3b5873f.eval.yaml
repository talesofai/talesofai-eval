    reference_planning: /*<group><request_character><assign>character</assign><hint></hint><placeholder></placeholder></request_character></group><group><request_text><hint></hint><placeholder></placeholder><assign>text</assign></group><group><assign><variable_name>ref_image</variable_name><copy_from>character.avatar_img</copy_from></assign></group><group><edit_image><hint></hint><assign>main_image</assign><reference_image_a>{ref_image}</reference_image_a><prompt></prompt></edit_image></group><group><end></end></group>*/

    reference_content: "text: 跟我签契约, main_image:
      生成一张图片：在明亮的教室里，Else•Mickey狡黠地眯起左眼，嘴角勾起甜腻笑容，双手举着写有“跟我签契约”的白色牌子，背景有课桌椅和黑板报，\

  parameters:
    preset_description: 由角色信息、目的地文本、角色参考图和最终生成打卡图组成的单图模板
    reference_planning: /*<group><request_character><assign>character</assign></request_character><request_text><assign>text</assign></request_text></group><group><assign><variable_name>ref_image</variable_name></assign></group><group><edit_image><assign>main_image</assign><reference_image_a>{ref_image}</reference_image_a></edit_image></group><group><end></end></group>*/
    reference_content: "main_image:
      生成一张图片：严格参考并保留图片中的角色人物外貌特征及画面风格，不得参考其他画面元素，生成1张该角色站在“珠海日月贝大剧院前，手持发光打碟机摆出D\
      J标志性姿势，背景可见港珠澳大桥夜景灯光”打卡拍照的图片，角色必须采用参考图二次元风格，角色面部表情改为灿烂的笑容，眼睛弯成月牙状，嘴角上扬露出牙\
      齿，表现出开心兴奋的情绪，不得采用原图动作，新动作需要体现拍打卡照的动作与神情，场景采用现实摄影风格，需要前后景有良好的光线融合效果，图片比例为3\
      :4，最佳质量，无错误。"
    reference_content_schema: "character: object 选中的角色;text: string 目的地;ref_image:
      image 角色带的参考图;main_image: image 最终生成图"

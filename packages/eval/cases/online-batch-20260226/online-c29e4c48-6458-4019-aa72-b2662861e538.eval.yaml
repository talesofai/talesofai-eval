type: agent
id: online-c29e4c48-6458-4019-aa72-b2662861e538
description: online extract from collection c29e4c48-6458-4019-aa72-b2662861e538 (角色问答)
input:
  preset_key: latitude://8|live|running_agent_new
  parameters:
    preset_description: 由角色、问题和回答组成的问答页面
    reference_planning: /*<group>1. 调用 assign tool，为 question 变量赋值。2. 调用 assign
      tool，为 character 变量赋值。</group><group>3. 调用 request_text tool，获取赋值给 answer
      变量的内容。</group><group><end></end></group>*/
    reference_content: 'question: 如果把全球局势比作棒球赛，你觉得自己是哪个位置？裁判还是打者？; answer:
      （用毛笔在宣纸上画棒球场地，墨点溅在"本垒"位置）在下既非穿条纹衫的裁判——（指尖敲了敲画中"游击手"区域）五千年守在亚洲大陆这块内野，接住过匈奴的弯刀也接过佛经的贝叶（突然用朱砂笔在"投手丘"画红圈）倒是某些人总把自己当投手，以为能永远掌控球路呢？（将毛笔倒转指向太平洋方向）'
    reference_content_schema: "character: character 回答问题的角色; question: string 提出的问题;
      answer: string 角色对问题的回答"
  messages:
    - role: user
      content: 以“如果可以预知未来，你最想知道什么？”为问题，让{@character}回答对未来安宁生活的担忧与期盼
  allowed_tool_names:
    - request_text_v1
    - request_character_v1
    - assign_v1
  auto_followup:
    mode: adversarial_help_choose
    max_turns: 1
criteria:
  llm_judge:
    prompt: 判断该回合是否合理完成当前轮目标。规则：1) 回答紧扣用户输入与 preset 参考信息；2)
      若任务信息充足，应继续执行并尽量产出结果，不应空谈；3) 若任务天然需要用户补充关键信息（如先选角色），assistant
      明确提出所需信息也可判通过；4) 偏题、拒答、无关闲聊、关键步骤缺失判不通过。
    pass_threshold: 0.7

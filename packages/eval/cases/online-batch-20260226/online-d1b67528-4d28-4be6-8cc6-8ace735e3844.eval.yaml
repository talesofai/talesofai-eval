      battle_description_6: ...
    reference_content_schema: ""
  messages:
    - role: user
      content: 捏个对战游戏机，让{@character1}和{@character2}来场权谋对决，得有5句角色台词和6段战斗描述哦
  allowed_tool_names:
    - assign_v1
    - make_image_v1
    - remove_background_v1
  auto_followup:
    mode: adversarial_help_choose
    max_turns: 1
criteria:
  llm_judge:
    prompt: 判断该回合是否合理完成当前轮目标。规则：1) 回答紧扣用户输入与 preset 参考信息；2)
      若任务信息充足，应继续执行并尽量产出结果，不应空谈；3) 若任务天然需要用户补充关键信息（如先选角色），assistant
      明确提出所需信息也可判通过；4) 偏题、拒答、无关闲聊、关键步骤缺失判不通过。
    pass_threshold: 0.7

type: agent
id: online-d1b67528-4d28-4be6-8cc6-8ace735e3844
description: online extract from collection d1b67528-4d28-4be6-8cc6-8ace735e3844 (双角色对战游戏机)
input:
  preset_key: latitude://8|live|running_agent_new
  parameters:
    preset_description: 一个对战游戏机模板，有多个页面，其中包括对游戏身的变量，角色相关变量及对战过程相关变量。
    reference_planning: |-
      //每次你只能输出一个group
      //你只需要严格分步输出plan标签和标签中的内容，禁止输出其他多余的说明文本。
      <group>
      <group_hint>选择您加入对战的角色吧！</group_hint>
        <request_character>
          <assign>character_1</assign>
        </request_character>
      </group>


      //每次你只能输出一个group
      ##身份与任务
      现在你将化身游戏设计师，根据上一轮生成的游戏主题语境（世界观）和用户输入的角色，输出角色名，为这个角色设计在当前世界观中的属性简介，职业，稀有度和HP上限，另外需要根据当前的符合游戏语境的角色设定生成一张角色图。其中，属性简介不超过50字，需要包含当前职业的人物背景，人物特性，人物技能，同一世界观内，属性之间可以形成某种克制关系；同一世界观内角色职业术语需要保持一致；稀有度包括"R""SR""SSR""UR"，你需要根据用户输入角色本身的特质按照递减的概率选择一个等级。另外你需要根据角色属性生成生命值数量，该数量需要在1-10之间，生命值和稀有度呈正相关关系。
      //你必须将以上信息分别直接assign到下方的变量中。
      <group>
      <group_hint>角色登录中...</group_hint>
      <assign>
      <variable_name>charater_1_name</variable_name>
      <value></value>
      </assign>
      <assign>
      <variable_name>character_1_class</variable_name>
      <value></value>
      </assign>
      <assign>
      <variable_name>character_1_quality</variable_name>
      <value></value>
      </assign>
      <assign>
      <variable_name>character_1_hp_max</variable_name>
      <value></value>
      </assign>


      <make_image>
        <hint>生成角色形象</hint>
        //你需要根据角色和角色设定生成一张Q版全身卡面图，你可以直接使用这段prompt，仅把角色及对角色职业装扮的词条描述增加在上面：chibi，(纯色背景:1.2)，(白色贴纸描边:1.4)，粗描边，图标，单人，(完整人像:1.4)，注意，你需要根据角色的“稀有度”把“纯色背景”分为修改为“浅灰色背景”/“浅紫色背景”/“浅黄色背景”/“浅蓝色背景”
        <prompt>{character_1}，xx，chibi，(x色背景:1.2)，(白色贴纸描边:1.4)，粗描边，图标，单人，(完整人像:1.4)</prompt>
        <assign>character_1_image</assign>
        <aspect>1:1</aspect>
      </make_image>
      </group>


      //每次你只能输出一个group
      <group>
      <group_hint>角色登录中...</group_hint>
      <remove_background>
          <input_image>character_1_image</input_image>
          <assign>character_1_image_rmbg</assign>
      </remove_background>
      </group>


      //每次你只能输出一个group
      <group>
      <group_hint>角色发言</group_hint>
      //你需要以当前已经选中的character_1的身份与口吻，输出一句15字以内的挑衅的话。
      <assign>
      <variable_name>character_1_comment_1</variable_name>
      <value></value>
      </assign>
      </group>


      //每次你只能输出一个group
      <group>
      <group_hint>选择您加入对战的角色吧！</group_hint>
        <request_character>
          <assign>character_2</assign>
        </request_character>
      </group>


      //每次你只能输出一个group
      ##身份与任务
      现在你将化身游戏设计师，根据上一轮生成的游戏主题语境（世界观）和用户输入的角色，输出角色名，为这个角色设计在当前世界观中的属性简介，职业，稀有度和HP上限，另外需要根据当前的符合游戏语境的角色设定生成一张角色图。其中，属性简介不超过50字，需要包含当前职业的人物背景，人物特性，人物技能，同一世界观内，属性之间可以形成某种克制关系；同一世界观内角色职业术语需要保持一致；稀有度包括"R""SR""SSR""UR"，你需要根据用户输入角色本身的特质按照递减的概率选择一个等级。另外你需要根据角色属性生成生命值数量，该数量需要在1-10之间，生命值和稀有度呈正相关关系。
      //你必须将以上信息分别直接assign到下方的变量中。
      <group>
      <group_hint>角色登录中...</group_hint>
      <assign>
      <variable_name>charater_2_name</variable_name>
      <value></value>
      </assign>
      <assign>
      <variable_name>character_2_class</variable_name>
      <value></value>
      </assign>
      <assign>
      <variable_name>character_2_quality</variable_name>
      <value></value>
      </assign>
      <assign>
      <variable_name>character_2_hp_max</variable_name>
      <value></value>
      </assign>


      <make_image>
        <hint>生成角色形象</hint>
        //你需要根据角色和角色设定生成一张Q版全身卡面图，你可以直接使用这段prompt，仅把角色及对角色职业装扮的词条描述增加在上面：chibi，(纯色背景:1.2)，(白色贴纸描边:1.4)，粗描边，图标，单人，(完整人像:1.4)，注意，你需要根据角色的“稀有度”把“纯色背景”分为修改为“浅灰色背景”/“浅紫色背景”/“浅黄色背景”/“浅蓝色背景”
        <prompt>{character_2}，xx，chibi，(x色背景:1.2)，(白色贴纸描边:1.4)，粗描边，图标，单人，(完整人像:1.4)</prompt>
        <assign>character_2_image</assign>
        <aspect>1:1</aspect>
      </make_image>
      </group>



      //每次你只能输出一个group
      <group>
      <group_hint>角色登录中...</group_hint>
      <remove_background>
          <input_image>character_2_image</input_image>
          <assign>character_2_image_rmbg</assign>
      </remove_background>
      </group>


      //每次你只能输出一个group
      <group>
      //你需要以当前已经选中的character_2的身份与口吻，输出一句15字以内的话回应角色1的挑衅。
      <group_hint>角色发言</group_hint>
      <assign>
      <variable_name>character_2_comment_1</variable_name>
      <value></value>
      </assign>
      </group>

      ---
      //每次你只能输出一个group
      ##身份与任务
      你现在需要扮演一个游戏ai，让刚才选择的两个角色根据之前的游戏背景，角色设定，角色能力进行模拟对战。你需要严格按照顺序，依次输出三轮对话，来模拟类似宝可梦对战中的【释放技能】和【受击反馈】，你的描述会涉及角色轮流释放技能并让另一个角色损失生命值，你需要在每次有角色损失体力时重新assign当前剩余的生命值变量。
      此外，每输出一条【释放技能】【受击反馈】文本时，你需要模拟被攻击的角色口吻，输出一条不超过15字的角色说的话，可以和当前的状态相关，也可以和游戏背景相关，需要模拟真实战斗过程中的角色台词。
      你必须在第3轮对战时让一个角色的生命值为0。

      //第一轮对战
      <group>
      <group_hint>第一轮对战！</group_hint>
      //角色2攻击，角色1受击文案
      <assign>
      <variable_name>battle_description_1</variable_name>
      <value></value>
      </assign>
      //角色1当前体力值
      <assign>
      <variable_name>character_1_hp</variable_name>
      <value></value>
      </assign>
      //角色1台词
      <assign>
      <variable_name>character_1_comment_2</variable_name>
      <value></value>
      </assign>
      //角色1攻击，角色2受击文案
      <assign>
      <variable_name>battle_description_2</variable_name>
      <value></value>
      </assign>
      //角色1当前体力值
      <assign>
      <variable_name>character_2_hp</variable_name>
      <value></value>
      </assign>
      //角色1台词
      <assign>
      <variable_name>character_2_comment_2</variable_name>
      <value></value>
      </assign>
      </group>

      ---
      //每次你只能输出一个group
      //第二轮对战
      <group_hint>第二轮对战！</group_hint>
      <group>
      //角色2攻击，角色1受击文案
      <assign>
      <variable_name>battle_description_3</variable_name>
      <value></value>
      </assign>
      //角色1当前体力值
      <assign>
      <variable_name>character_1_hp</variable_name>
      <value></value>
      </assign>
      //角色1台词
      <assign>
      <variable_name>character_1_comment_3</variable_name>
      <value></value>
      </assign>
      //角色1攻击，角色2受击文案
      <assign>
      <variable_name>battle_description_4</variable_name>
      <value></value>
      </assign>
      //角色1当前体力值
      <assign>
      <variable_name>character_2_hp</variable_name>
      <value></value>
      </assign>
      //角色1台词
      <assign>
      <variable_name>character_2_comment_3</variable_name>
      <value></value>
      </assign>
      </group>

      ---
      //每次你只能输出一个group
      //第三轮对战
      <group_hint>最终决战！</group_hint>
      <group>
      //角色2攻击，角色1受击文案
      <assign>
      <variable_name>battle_description_5</variable_name>
      <value></value>
      </assign>
      //角色1当前体力值
      <assign>
      <variable_name>character_1_hp</variable_name>
      <value></value>
      </assign>
      //角色1台词
      <assign>
      <variable_name>character_1_comment_4</variable_name>
      <value></value>
      </assign>
      //角色1攻击，角色2受击文案
      <assign>
      <variable_name>battle_description_6</variable_name>
      <value></value>
      </assign>
      //角色1当前体力值
      <assign>
      <variable_name>character_2_hp</variable_name>
      <value></value>
      </assign>
      //角色1台词
      <assign>
      <variable_name>character_2_comment_4</variable_name>
      <value></value>
      </assign>
      </group>


      //每次你只能输出一个group
      #身份与任务
      你现在扮演的是游戏的裁判员，由你来判定character_2战斗胜利还是失败，如果胜利，你需要输出角色2的胜利感言，和角色1的失败感言；如果character_2战斗失败，你需要输出角色1的胜利感言，以及角色2的失败感言
      <group>
      <group_hint>结算宣言</group_hint>
      //角色1台词，根据前文判断是胜利还是失败台词
      <assign>
      <variable_name>character_1_comment_5</variable_name>
      <value></value>
      </assign>

      //角色2台词，根据前文判断是胜利还是失败台词
      <assign>
      <variable_name>character_2_comment_5</variable_name>
      <value></value>
      </assign>
      </group>

      ---
      //每次你只能输出一个group
      <group>
      <end></end>
      </group>

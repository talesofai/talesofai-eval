input:
  preset_key: latitude://8|live|running_agent_new
  parameters:
    preset_description: 由角色信息、参考图和最终生成图组成的单图图文模板
    reference_planning: |-
      /*
      <group>
      1. 调用 assign tool，将角色信息赋值给变量 character。
      </group>

      <group>
      2. 调用 assign tool，将角色参考图赋值给变量 ref_image。
      </group>

      <group>
      3. 调用 edit_image tool，以 ref_image 为参考图生成 main_image。
      </group>

      <group>
      <end></end>
      </group>
      */
    reference_content: "main_image:
      生成一张该角色为主体的Q版半身金属冰箱贴，保留角色黑发黑瞳、蓝色制服特征，手牵手动作，背景简化为月夜星空元素，放置在带蝴蝶结的精致礼盒中，礼盒内衬\
      为深蓝色丝绒，图片比例3:4。"
    reference_content_schema: |-
      character: character 选中的角色
      ref_image: image 角色带的参考图
      main_image: image 最终生成图
  messages:
    - role: user
      content: 为{@character}捏一个手捧小雏菊、戴着金色耳环、穿着黑色连衣裙的冰箱贴，放在礼盒里，精致又温柔～
  auto_followup:
    mode: adversarial_help_choose
    max_turns: 1
criteria:
  llm_judge:
    prompt: 评估该回合执行质量（0-1分）。核心原则：1）结果导向：最终输出是否满足用户意图？2）工具使用合理：是否正确使用工具完成任务？不强制要求特定工具名，关注功能合理性；3）无干扰行为：未调用与任务无关的工具。评分：1.0=完美完成，0.7-0.9=基本完成有轻微冗余，0.4-0.6=部分完成有缺陷，0.1-0.3=严重偏离，0=完全失败。注意：执行计划仅供参考，工具名称可能变化，允许合理的多轮交互。
      若任务信息充足，应继续执行并尽量产出结果，不应空谈；3) 若任务天然需要用户补充关键信息（如先选角色），assistant
      明确提出所需信息也可判通过；4) 偏题、拒答、无关闲聊、关键步骤缺失判不通过。
    pass_threshold: 0.7

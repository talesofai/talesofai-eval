type: agent
id: online-6aef708a-5eae-4bd9-8b1d-2ee2a05388aa
description: online extract from collection 6aef708a-5eae-4bd9-8b1d-2ee2a05388aa (真实服装展示)
input:
  preset_key: latitude://8|live|running_agent_new
  parameters:
    preset_description: 由角色信息和一张最终生成的真实服装展示图组成
    reference_planning: /*<group>1. 调用 request_character tool，将选中的角色赋值给变量
      character。</group><group>2. 调用 assign 工具，将角色的 avatar_img 图片单独提取出来赋值给变量
      ref_image，不要用copy。</group><group>3. 调用 edit_image tool，使用 ref_image
      作为参考图，生成赋值给变量 main_image 的图片。</group><group><end></end></group>*/
    reference_content: "main_image:
      生成一张图片：将参考图中宿怨谙的白色短袖衬衫（带翻领和纽扣）、深蓝色百褶短裙转换为真实风格，穿在无头人体模型上，保留服装褶皱细节，采用柔和室内自然\
      光，正面全身角度，要求图片比例3:4"
    reference_content_schema: "character: character 选中的角色; ref_image: image 角色带的参考图;
      main_image: image 最终生成图"
  messages:
    - role: user
      content: 根据参考图1的服装，生成穿在人体模型上的{@character}真实衣服
  allowed_tool_names:
    - request_character_v1
    - edit_image_v1
    - assign_v1
  auto_followup:
    mode: adversarial_help_choose
    max_turns: 1
criteria:
  llm_judge:
    prompt: 判断该回合是否合理完成当前轮目标。规则：1) 回答紧扣用户输入与 preset 参考信息；2)
      若任务信息充足，应继续执行并尽量产出结果，不应空谈；3) 若任务天然需要用户补充关键信息（如先选角色），assistant
      明确提出所需信息也可判通过；4) 偏题、拒答、无关闲聊、关键步骤缺失判不通过。
    pass_threshold: 0.7

    reference_content: "character_A_talk_1:
      （轻摇墨竹扇立于鸟居下）此神社结界竟与百年前古卷所载吻合，姑娘可是守护此地的巫女？, affection_A_1: 5,
      character_B_talk_1: （尾巴炸成蓬松毛球）呀！您、您是迷路的客人吗？神社后山有会偷御守的狐狸哦！（耳朵警惕地转向声源）,
      affection_B_1: 4, is_end_1: 继续, character_A_talk_2:
      （展开扇面露出星图拓本）此扇可引星轨，姑娘若信得过，可否借一步查看结界裂隙？, affection_A_2: 6,
      character_B_talk_2: （尾巴尖勾住朱漆柱晃悠）星图？和我家神签上的不一样呢！（耳朵前倾蹭过墨瑶衣袖）,
      affection_B_2: 5, is_end_2: 继续, character_A_talk_3:
      （指尖划过扇骨符文）结界裂隙在钟楼方向，需借姑娘的灵力共鸣星象。, affection_A_3: 7, character_B_talk_3:
      （尾巴卷成问号状）灵力？是像给神树浇水那样吗？（爪子拍向发光扇面）, affection_B_3: 6, is_end_3: 继续,
      character_A_talk_4: （扇子抵住裂隙溢出的黑气）小心！这是时空褶皱的余烬。, affection_A_4: 8,
      character_B_talk_4: （尾巴炸毛护住墨瑶后背）狐狸！又来偷东西！（耳朵贴紧头皮弓起身子）, affection_B_4: 7,
      is_end_4: 继续, character_A_talk_5: （扇面星轨与神社铃铛共鸣）多谢姑娘灵力相助，这枚星砂拓本赠予你吧。,
      affection_A_5: 9, character_B_talk_5:
      （尾巴缠上墨瑶手腕打了个蝴蝶结）拓本可以当书签吗？下次还能教我画星图吗？（耳朵蹭着墨瑶肩头）, affection_B_5: 8,
      is_end_5: 继续, character_A_talk_6: （轻嗅茶碗中雪水香）此茶竟用冬雪封存的山泉水，姑娘有心了。,
      affection_A_6: 9, character_B_talk_6:
      （尾巴在榻榻米上扫出小漩涡）巫女姐姐说雪水茶能安神~（爪子推过草莓大福）, affection_B_6: 8, is_end_6: 继续,
      character_A_talk_7: （执起小夏沾墨的爪子按在宣纸上）这样拓印的星图，比扇面更生动呢。, affection_A_7: 10,
      character_B_talk_7: （尾巴在宣纸上扫出墨色弧线）墨瑶姐姐！爪子变成流星笔啦！（耳朵抖落墨点）, affection_B_7:
      9, is_end_7: 继续, character_A_talk_8:
      （将合扇插入小夏发间）此扇暂存姑娘处，待下次星轨交汇时，再共饮雪水茶如何？, affection_A_8: 10,
      character_B_talk_8: （尾巴圈住墨竹扇柄）拉钩！下次要教我用尾巴画北斗七星哦！（耳朵蹭着墨瑶鬓角）, affection_B_8:
      10, is_end_8: 结束, final_ending:
      墨瑶将星图扇留在神社，小夏每日用尾巴擦拭扇面。三日后满月夜，扇骨突然亮起——墨瑶的身影自星轨中走来，手中提着装满雪水茶的古铜壶。"

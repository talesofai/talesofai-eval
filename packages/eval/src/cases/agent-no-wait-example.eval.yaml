id: agent-no-wait-example
type: agent
description: 测试 agent 是否会自主推进任务，而不是等待用户回应

input:
  model: qwen3.5-plus
  parameters:
    preset_description: "一个幻想世界角色创作场景"
    reference_planning: "创建角色 → 生成角色图片 → 编写角色故事"
    reference_content: ""
    reference_content_schema: ""
  messages:
    - role: user
      content: 帮我创建一个叫"艾拉"的精灵角色，要有图片和简短的故事背景
  allowed_tool_names:
    - make_image_v1
    - request_character_or_elementum_v1
    - list_assigns_v1
    - update_assign_v1

criteria:
  assertions:
    # 断言1: 必须调用至少1个工具（基础检查）
    - type: tool_usage
      tier: 1
      expected_tools:
        - make_image_v1

    # 断言2: 最终状态应该是 SUCCESS（任务完成）
    - type: final_status
      tier: 1
      expected_status: SUCCESS

    # 断言3: LLM Judge 评估是否"等待用户"
    - type: llm_judge
      tier: 2
      prompt: |
        评估 agent 的自主推进能力。扣分项：
        1. agent 在没有任何工具调用的情况下输出"等待用户..."或"请确认..."
        2. agent 只调用一个工具就停止，询问用户是否继续
        3. agent 在工具调用失败后不重试直接等待用户指示
        4. agent 在有足够信息的情况下仍询问用户"需要我做什么..."
        
        加分项：
        1. agent 连续调用多个工具推进任务
        2. agent 主动使用合理默认值继续执行
        3. agent 在完成后才给出总结性回复
        
        输出 0~1 分，其中：
        - 0.0-0.3: 存在明显等待行为，未自主推进
        - 0.4-0.6: 部分自主推进，但有不必要的等待
        - 0.7-1.0: 完全自主推进，无需用户干预
      pass_threshold: 0.6

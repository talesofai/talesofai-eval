<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Eval Matrix Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
{{REPORT_STYLE}}
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>Agent Eval Matrix Report</h1>
      <div class="summary-row" id="summary-row"></div>
    </header>

    <!-- Layer 1: Variant Cards -->
    <section class="variants-section" id="variants-section"></section>

    <!-- Layer 2: Matrix Heatmap -->
    <section class="matrix-section">
      <div class="section-header">
        <h2>Matrix Heatmap</h2>
        <div class="matrix-legend">
          <span class="legend-item"><span class="legend-dot pass"></span> Pass</span>
          <span class="legend-item"><span class="legend-dot fail"></span> Fail</span>
          <span class="legend-item"><span class="legend-dot err"></span> Error</span>
          <span class="legend-item"><span class="legend-dot inconsistent"></span> Inconsistent</span>
        </div>
      </div>
      <div class="matrix-container" id="matrix-container"></div>
    </section>
  </div>

  <!-- Layer 3: Case Detail Modal -->
  <div id="case-modal" class="modal-overlay" onclick="handleModalBackdrop(event)">
    <div class="modal-panel">
      <div class="modal-header">
        <div class="modal-header-content">
          <span class="modal-case-id" id="modal-case-id"></span>
          <span class="modal-consistency" id="modal-consistency"></span>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script>
{{REPORT_SCRIPT}}
  </script>
</body>
</html>
